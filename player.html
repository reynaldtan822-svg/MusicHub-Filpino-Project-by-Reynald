<!DOCTYPE html>

<html>

  <head>

	<meta charset="UTF-8">

	<meta name="viewport"
	  content="width=device-width,initial-scale=1">

	<title>Now Playing</title>

	<link rel="stylesheet"
	  href="player.css">

  </head>

  <body>

	<div class="player">

	  <img
		id="cover">

	  <h2 id="title"></h2>

	  <p id="channel"></p>

	  <div id="player"></div>
	  
	  <div class="speed-controls">

		<label>

		  Speed

		</label>

		<select id="speedSelect">

		  <option value="0.5">0.5x</option>

		  <option value="0.75">0.75x</option>

		  <option value="1" selected>1x</option>

		  <option value="1.25">1.25x</option>

		  <option value="1.5">1.5x</option>

		  <option value="2">2x</option>

		</select>

	  </div>
	  
	  <div class="player-controls">

		<div class="time-row">

		  <span id="currentTime">0:00</span>

		  <input
			type="range"
			id="progressBar"
			value="0"
			min="0"
			max="100">

		  <span id="duration">0:00</span>

		</div>

		<div class="volume-row">

		  🔊

		  <input
			type="range"
			id="volumeBar"
			min="0"
			max="100"
			value="100">

		</div>

	  </div> 
	  
	  <div class="actions">

		<button id="favBtn">

		  ❤️ Favorite

		</button>
		
		<button id="playlistBtn">

		  ➕ Playlist

		</button>
		
		<button id="shareBtn">

		  📤 Share

		</button>
		
		<button id="prevBtn">

		  ⏮ Previous

		</button>

		<button id="nextBtn">

		  Next ⏭

		</button>
		
		<button id="shuffleBtn">🔀 Shuffle</button>

		<button id="repeatBtn">🔁 Repeat</button>

		<button id="queueBtn">📜 Queue</button>

		<button id="clearQueueBtn">🗑️ Clear</button>
		
	  </div>

	</div>

	<script src="https://www.youtube.com/iframe_api"></script>

	<script src="player.js"></script>

  </body>

</html>
