<!DOCTYPE html>
<html>
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>YouTube API Test</title>
  </head>

  <body>

	<h2>YouTube API Test</h2>

	<button onclick="testAPI()">
	  Test Connection
	</button>

	<div id="result"></div>

<script>

const API_KEY="YOUR_API_KEY";

function testAPI(){

var url=
"https://www.googleapis.com/youtube/v3/search"+
"?part=snippet"+
"&q=music"+
"&maxResults=5"+
"&type=video"+
"&key="+API_KEY;

fetch(url)

.then(function(response){
    return response.json();
})

.then(function(data){

    if(data.error){

        document.getElementById("result").innerHTML =
        "❌ " + data.error.message;

        return;
    }

    document.getElementById("result").innerHTML =
    "✅ API Connected<br><br>Videos Found: " + data.items.length;

});

}

</script>

  </body>
</html>
